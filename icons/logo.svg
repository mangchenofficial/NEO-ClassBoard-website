<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6750A4"/>
      <stop offset="100%" stop-color="#4A3B7C"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8DEF8"/>
      <stop offset="100%" stop-color="#D0BCFF"/>
    </linearGradient>
  </defs>

  <!-- 圆角矩形背景 -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- 黑板主体 -->
  <rect x="96" y="120" width="320" height="200" rx="16" ry="16" fill="#2D2640" stroke="#D0BCFF" stroke-width="3"/>

  <!-- 黑板上的文字线条装饰 -->
  <line x1="128" y1="160" x2="240" y2="160" stroke="#6750A4" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <line x1="128" y1="185" x2="320" y2="185" stroke="#6750A4" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  <line x1="128" y1="210" x2="280" y2="210" stroke="#6750A4" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <line x1="128" y1="235" x2="370" y2="235" stroke="#6750A4" stroke-width="5" stroke-linecap="round" opacity="0.35"/>
  <line x1="128" y1="260" x2="260" y2="260" stroke="#6750A4" stroke-width="5" stroke-linecap="round" opacity="0.45"/>

  <!-- NEO 大字母 -->
  <text x="256" y="206" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="72" fill="url(#accentGrad)" letter-spacing="8">NEO</text>

  <!-- 黑板底部托盘 - 粉笔槽 -->
  <rect x="96" y="320" width="320" height="12" rx="4" ry="4" fill="#1E1833"/>
  <circle cx="180" cy="326" r="10" fill="#E8DEF8"/>
  <circle cx="280" cy="326" r="10" fill="#D0BCFF"/>
  <circle cx="330" cy="326" r="10" fill="#AE90BC"/>

  <!-- ClassBoard 文字 -->
  <text x="256" y="408" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="36" fill="#E8DEF8" letter-spacing="4">
    ClassBoard
  </text>
</svg>